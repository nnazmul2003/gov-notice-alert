name: Government Notice Checker

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run Script
        run: python main.py

      - name: Commit last_notice.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git add last_notice.json
          git diff --cached --quiet || git commit -m "Update last notice"
          git push
