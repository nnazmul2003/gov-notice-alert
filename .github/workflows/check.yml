name: MOFA Notice Telegram Alert

on:
  schedule:
    - cron: '*/5 * * * *' # প্রতি ৫ মিনিট পর পর অটোমেটিক চেক করবে
  workflow_dispatch:      # ম্যানুয়ালি রান করার অপশন

jobs:
  check-notice:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # ট্র্যাক ফাইল গিটহাবে পুশ করার পারমিশন

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install requirements
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run MOFA notice checker
      run: python mofa_main.py  # পাইথন ফাইলের নাম

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add mofa_notices.txt || true  
        git commit -m "Update MOFA notices list [skip ci]" || true
        git push || true
